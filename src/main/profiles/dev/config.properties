db.url=jdbc:postgresql://localhost:5432/tugestorai
db.user=tugestorai
db.password=${DB_PASSWORD}

telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=TuGestorAIBot

openai.api.key=${OPENAI_API_KEY}

anthropic.api.key=${ANTHROPIC_API_KEY}

pdf.output.dir=E:\Proyectos\\TuGestorAI\\pdfs

# Cifrado AES-256-GCM (32 bytes en Base64) ? NO compartir ni commitear
crypto.secret.key=${CRYPTO_SECRET_KEY}

# Email (Jakarta Mail / angus-mail)
# Variables de entorno equivalentes: EMAIL_SMTP_HOST, EMAIL_SMTP_PORT, EMAIL_SMTP_USER, etc.
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.user=makysteam@gmail.com
email.smtp.password=${EMAIL_SMTP_PASSWORD}
email.from=TuGestorAI <makysteam@gmail.com>

# Segundos tras los que se borran automáticamente los mensajes con documentos en Telegram.
limit.telegram.doc.ttl=300

# Máximo de ediciones que el autónomo puede hacer sobre un borrador antes de confirmarlo.
limit.edits.per.presupuesto=5