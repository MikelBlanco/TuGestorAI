# ─── Límites de protección de costes ─────────────────────────────────────────
# Variables de entorno equivalentes: LIMITES_AUDIO_DURACION_MAX_SEG, etc.

# Duración máxima de un audio aceptado (segundos). Defecto: 180 = 3 min
limites.audio.duracion.max.seg=180

# Tamaño máximo de un fichero de audio (bytes). Defecto: 1048576 = 1 MB
limites.audio.tamano.max.bytes=1048576

# Rate limit por usuario: máximo de audios procesados en la última hora
limites.audio.usuario.hora=10

# Rate limit por usuario: máximo de audios procesados en el último día
limites.audio.usuario.dia=30

# Tope de coste diario global: máximo de audios en todo el sistema por día.
# Estimación: €0,007 por audio de 1 min → 428 audios ≈ €3/día
limites.coste.diario.max.audios=428
